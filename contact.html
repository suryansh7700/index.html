<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | RiseUp</title>

<link rel="stylesheet" href="style.css">

<style>

body{
    background:#0f172a;
    color:white;
    font-family:Poppins,sans-serif;
}

.container{
    width:90%;
    max-width:1000px;
    margin:120px auto;
}

h1{
    text-align:center;
    font-size:42px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:40px;
}

.contact-box{
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    padding:40px;
}

.input-group{
    margin-bottom:20px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
}

.input-group input,
.input-group textarea{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    font-size:16px;
}

textarea{
    resize:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    font-size:18px;
    cursor:pointer;
}

button:hover{
    opacity:.9;
}

#message{
    margin-top:20px;
    text-align:center;
    color:#90ee90;
}

.info{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    margin-top:40px;
}

.card{
    background:#1e293b;
    padding:20px;
    border-radius:15px;
}

.card h3{
    color:#38bdf8;
    margin-bottom:10px;
}

footer{
    margin-top:60px;
    text-align:center;
}

</style>

</head>

<body>

<header>

<div class="logo">RiseUp</div>

<nav>
<a href="index.html">Home</a>
<a href="dashboard.html">Dashboard</a>
<a href="quotes.html">Quotes</a>
<a href="roadmap.html">Roadmaps</a>
</nav>

</header>

<div class="container">

<h1>Contact Us</h1>

<p class="subtitle">
We'd love to hear from you!
</p>

<div class="contact-box">

<div class="input-group">
<label>Your Name</label>
<input type="text" id="name">
</div>

<div class="input-group">
<label>Email</label>
<input type="email" id="email">
</div>

<div class="input-group">
<label>Message</label>
<textarea rows="6" id="text"></textarea>
</div>

<button onclick="sendMessage()">
Send Message
</button>

<p id="message"></p>

</div>

<div class="info">

<div class="card">
<h3>📧 Email</h3>
<p>support@riseupdemo.com</p>
</div>

<div class="card">
<h3>📱 Instagram</h3>
<p>@RiseUpOfficial</p>
</div>

<div class="card">
<h3>🌐 Website</h3>
<p>www.riseupdemo.com</p>
</div>

</div>

<footer>

<p>© 2026 RiseUp</p>

</footer>

</div>

<script>

function sendMessage(){

const name=document.getElementById("name").value;
const email=document.getElementById("email").value;
const text=document.getElementById("text").value;

if(name=="" || email=="" || text==""){

alert("Please fill all fields.");

return;

}

document.getElementById("message").innerHTML=
"✅ Thank you for contacting us! We'll get back to you soon.";

document.getElementById("name").value="";
document.getElementById("email").value="";
document.getElementById("text").value="";

}

</script>

</body>
</html>
