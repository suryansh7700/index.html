<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign Up | RiseUp</title>

<link rel="stylesheet" href="style.css">

<style>
body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:linear-gradient(135deg,#0f172a,#1e293b,#334155);
}

.signup-box{
    width:420px;
    max-width:90%;
    padding:40px;
    background:rgba(255,255,255,.08);
    backdrop-filter:blur(15px);
    border-radius:20px;
    box-shadow:0 20px 40px rgba(0,0,0,.3);
}

.signup-box h1{
    text-align:center;
    color:#38bdf8;
    margin-bottom:25px;
}

.input-group{
    margin-bottom:18px;
}

.input-group label{
    display:block;
    margin-bottom:8px;
}

.input-group input{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#f1f5f9;
    font-size:16px;
}

button{
    width:100%;
    padding:14px;
    border:none;
    border-radius:10px;
    background:#38bdf8;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    transform:scale(1.02);
}

#message{
    margin-top:15px;
    text-align:center;
    color:#90ee90;
}

#error{
    margin-top:15px;
    text-align:center;
    color:#ff8080;
}

p{
    margin-top:20px;
    text-align:center;
}

a{
    color:#38bdf8;
    text-decoration:none;
}
</style>

</head>

<body>

<div class="signup-box">

<h1>Create Account 🚀</h1>

<div class="input-group">
<label>Username</label>
<input type="text" id="newUsername" placeholder="Choose a username">
</div>

<div class="input-group">
<label>Password</label>
<input type="password" id="newPassword" placeholder="Choose a password">
</div>

<div class="input-group">
<label>Confirm Password</label>
<input type="password" id="confirmPassword" placeholder="Confirm password">
</div>

<button onclick="signup()">
Create Account
</button>

<p id="message"></p>
<p id="error"></p>

<p>
Already have an account?
<a href="login.html">Login</a>
</p>

</div>

<script src="auth.js"></script>

</body>
</html>
